spring.application.name=estoque

# ===== PostgreSQL (Docker Compose) =====
spring.datasource.url=jdbc:postgresql://localhost:5432/estoque_metalurgica
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== JWT =====
api.security.token.secret=${JWT_SECRET:metalurgica-estoque-secret-key-2026}

# ===== CORS =====
api.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173
